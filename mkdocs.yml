site_name: pyratatui
site_description: Production-grade Python bindings for ratatui 0.29 + tachyonfx animations
site_url: https://pyratatui.github.io/pyratatui
repo_url: https://github.com/pyratatui/pyratatui
repo_name: pyratatui/pyratatui
docs_dir: docs

theme:
  name: material
  logo: gallery/pyratatui.png
  favicon: gallery/pyratatui.png
  palette:
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - tables

nav:
  - Home: index.md
  - Installation: installation.md
  - Tutorial:
      - Quickstart: tutorial/quickstart.md
      - Async Updates: tutorial/async_updates.md
      - Effect Workflow: tutorial/effect_workflow.md
      - Progress Bar: tutorial/progress_bar.md
  - API Reference:
      - Terminal & Frame: reference/terminal.md
      - Layout: reference/layout.md
      - Widgets: reference/widgets.md
      - Effects (TachyonFX): reference/effects.md
      - Style & Text: reference/style.md
  - Build & Package:
      - Build Scripts: build/build_scripts.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pyratatui/pyratatui
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pyratatui

copyright: "pyratatui contributors — MIT License"
