name: CI

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# ──────────────────────────────────────────────────────────────────────────────
# JOB 1 – Build wheels in parallel across all three OSes.
# Linux uses the real manylinux Docker container via maturin-action.
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Linux: maturin-action launches a manylinux_2_17 container internally,
      # so the resulting wheel is genuinely manylinux-compliant.
      - name: Build wheels – Linux (manylinux container)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --strip --out dist
          manylinux: auto   # picks manylinux_2_17 (aka manylinux2014) automatically

      - name: Build wheels – macOS / Windows
        if: runner.os != 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --strip --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

# ──────────────────────────────────────────────────────────────────────────────
# JOB 2 – Collect all wheels, cut the GitHub Release, publish to PyPI once.
# Runs only after ALL three build jobs succeed.
# ──────────────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release & PyPI Publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # required for PyPI trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so `git tag` sees everything

      # Merge all three per-OS artifact directories into dist/
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      # Single combined checksum file over every wheel
      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum *.whl > SHA256SUMS

      # Pull version from pyproject.toml (works for both [project] and [tool.poetry])
      - name: Extract version
        id: version
        run: |
          VERSION=$(sed -n 's/^version *= *"\(.*\)"/\1/p' pyproject.toml | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Find the tag immediately before the one being published
      - name: Determine previous tag
        id: prev
        run: |
          git fetch --tags
          CURRENT="v${{ steps.version.outputs.version }}"
          # List all tags newest-first, skip the current one
          PREV=$(git tag --sort=-v:refname | grep -v "^${CURRENT}$" | head -1 || true)
          echo "previous=$PREV" >> "$GITHUB_OUTPUT"

      # Write the changelog to a file → avoids multiline GITHUB_OUTPUT quoting issues
      # and YAML expansion pitfalls when passing to action inputs.
      - name: Build release body
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV="${{ steps.prev.outputs.previous }}"
          if [ -z "$PREV" ]; then
            echo "Initial release v${VERSION}" > release_body.md
          else
            printf "### 📜 Full changelog\nhttps://github.com/%s/compare/%s...v%s\n" \
              "${{ github.repository }}" "$PREV" "$VERSION" > release_body.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          body_path: release_body.md   # file avoids YAML quoting issues
          files: |
            dist/*.whl
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # pypa/gh-action-pypi-publish uploads the pre-built wheels directly.
      # Uses OIDC trusted publishing by default (no token needed if configured on PyPI).
      # Fallback: set password: ${{ secrets.PYPI_TOKEN }} and remove id-token: write.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true   # safe to re-run without failing on duplicates
