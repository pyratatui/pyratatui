name: CI

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build wheels (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python for host builds
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: "pip"

      # Windows/macOS build with maturin directly
      - name: Build wheels (host)
        if: runner.os != 'Linux'
        run: |
          python -m pip install --upgrade pip setuptools wheel maturin==1.7.2
          maturin build --release --strip --out dist

      # Linux: use manylinux container via PyO3/maturin-action
      - name: Build Linux manylinux wheels
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          # Runs maturin inside a manylinux2014 container
          command: build
          args: --release --strip
          manylinux: "2014"
          maturin-version: "1.7.2"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  release:
    name: Create GitHub Release with Changelog
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (for version & changelog)
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Extract version
        id: version
        run: |
          python - << 'EOF'
          import tomli
          with open("pyproject.toml","rb") as f:
              data = tomli.load(f)
          print("version="+data["project"]["version"])
          EOF > version.txt
          echo "version=$(cut -d= -f2 version.txt)" >> $GITHUB_OUTPUT

      - name: Generate categorized changelog
        id: changelog
        uses: janheinrichmerker/action-github-changelog-generator@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          unreleased-only: true
          breakingLabels: "breaking,major"
          bugLabels: "bug,fix"
          enhancementLabels: "enhancement,feature"
          securityLabels: "security"

      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.whl > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ${{ steps.changelog.outputs.changelog }}
          files: |
            dist/*.whl
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
      
