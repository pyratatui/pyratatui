name: CI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-publish:
    name: Build, Release & Publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel maturin==1.7.2

      - name: Build wheels
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            # Enforce manylinux bundle on Linux for PyPI compliance
            maturin build --release --strip --out dist --manylinux 2014
          else
            maturin build --release --strip --out dist
          fi

      - name: Generate checksums
        shell: bash
        run: |
          mkdir -p dist/checksums
          for whl in dist/*.whl; do
            sha256sum "$whl" >> dist/checksums/SHA256SUMS
          done

      - name: Extract version
        id: version
        run: |
          VERSION=$(sed -n 's/^version *= *"\(.*\)"/\1/p' pyproject.toml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine previous tag
        id: prev
        run: |
          git fetch --tags
          PREV=$(git tag --sort=-v:refname | sed -n '2p' || true)
          echo "previous=$PREV" >> $GITHUB_OUTPUT

      - name: Build changelog body
        id: body
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PREV=${{ steps.prev.outputs.previous }}
          if [ -z "$PREV" ]; then
            echo "body=Initial release v$VERSION" >> $GITHUB_OUTPUT
          else
            printf "body=### 📜 Full changelog\nhttps://github.com/${{ github.repository }}/compare/%s...v%s\n" "$PREV" "$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.body.outputs.body }}
          files: |
            dist/*.whl
            dist/checksums/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        shell: bash
        run: |
          for whl in dist/*.whl; do
            maturin publish --release --manifest-path "$(dirname "$whl")/pyproject.toml" \
              --compatibility manylinux2014
          done
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          