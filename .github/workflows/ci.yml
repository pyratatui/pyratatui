name: CI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  MATURIN_VERSION: "v1.8.1"

# ──────────────────────────────────────────────────────────────────────────────
# JOB 0 · Security audit
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "pyratatui-audit"
          cache-on-failure: true

      - name: Run cargo audit
        run: |
          cargo install cargo-audit --locked --quiet
          cargo audit

# ──────────────────────────────────────────────────────────────────────────────
# JOB 1 · Build wheels (3 targets in parallel)
# ──────────────────────────────────────────────────────────────────────────────
  build:
    name: Build · ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: audit

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_type: linux

          - name: macOS arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            os_type: macos

          - name: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            os_type: windows

    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal

      # Caches ~/.cargo/registry, ~/.cargo/git, and ./target
      # maturin-action mounts ~/.cargo into its Docker container so Linux gets it too
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "pyratatui-${{ matrix.target }}"
          cache-on-failure: true

      # sccache wraps rustc on macOS/Windows for compiler-output-level caching
      - name: Set up sccache
        if: matrix.os_type != 'linux'
        uses: mozilla/sccache-action@v0.0.9

      - name: Enable sccache
        if: matrix.os_type != 'linux'
        shell: bash
        run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: "pip"

      # Linux: maturin-action spins up a genuine manylinux_2_17 Docker container
      # — the only correct way to produce PyPI-compliant wheels (no GLIBC leakage)
      - name: Build wheel (Linux — manylinux container)
        if: matrix.os_type == 'linux'
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          command: build
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --strip --out dist

      - name: Build wheel (macOS / Windows)
        if: matrix.os_type != 'linux'
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          command: build
          target: ${{ matrix.target }}
          args: --release --strip --out dist

      # Catch silent failures (wrong ABI, missing symbols) before artifact upload
      - name: Smoke-test wheel
        shell: bash
        run: |
          pip install --no-index --find-links dist pyratatui
          python -c "import pyratatui; print('✅ import ok:', pyratatui.__version__)"

      # Sigstore SLSA provenance — verifiable with:
      #   gh attestation verify <wheel> --repo pyratatui/pyratatui
      - name: Attest wheel provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 1

# ──────────────────────────────────────────────────────────────────────────────
# JOB 2 · Release (runs once after all 3 builds pass)
# ──────────────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release & PyPI Publish
    needs: [audit, build]
    runs-on: ubuntu-latest
    environment: pypi   # configure Trusted Publisher here on PyPI

    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          command: sdist
          args: --out dist

      - name: Generate SHA256SUMS
        run: |
          cd dist && sha256sum *.whl *.tar.gz > SHA256SUMS && cat SHA256SUMS

      - name: Extract version
        id: version
        run: |
          VERSION=$(sed -n 's/^version *= *"\(.*\)"/\1/p' pyproject.toml | head -1)
          [ -z "$VERSION" ] && { echo "❌ version not found in pyproject.toml" >&2; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine previous tag
        id: prev
        run: |
          git fetch --tags
          CURRENT="v${{ steps.version.outputs.version }}"
          PREV=$(git tag --sort=-v:refname \
                 | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' \
                 | grep -v "^${CURRENT}$" \
                 | head -1 || true)
          echo "previous=$PREV" >> "$GITHUB_OUTPUT"

      # Write to a file — avoids multiline $GITHUB_OUTPUT quoting bugs entirely
      - name: Build release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV="${{ steps.prev.outputs.previous }}"
          {
            echo "## pyratatui v${VERSION}"
            echo ""
            if [ -z "$PREV" ]; then
              echo "_🎉 Initial release_"
            else
              echo "### 📜 Full changelog"
              echo "https://github.com/${{ github.repository }}/compare/${PREV}...v${VERSION}"
            fi
            echo ""
            echo "### 📦 Wheels"
            echo "| File | Platform |"
            echo "|------|----------|"
            for f in dist/*.whl; do
              fname=$(basename "$f")
              plat=$(echo "$fname" | rev | cut -d'-' -f1 | rev | sed 's/\.whl//')
              echo "| \`$fname\` | $plat |"
            done
            echo ""
            echo "_Verify integrity with \`SHA256SUMS\` attached below._"
          } > release_body.md

      - name: Attest sdist provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          body_path: release_body.md
          make_latest: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # OIDC Trusted Publishing — no PYPI_TOKEN secret needed.
      # Setup: PyPI → Your project → Publishing → Add Publisher
      #   owner: pyratatui  repo: pyratatui  workflow: CI.yml  env: pypi
      # Fallback to token: uncomment password line + add PYPI_TOKEN secret.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          # password: ${{ secrets.PYPI_TOKEN }}
          