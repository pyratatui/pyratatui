name: CI

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  MATURIN_VERSION: "v1.8.1"

jobs:
  build:
    name: Build · ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_type: linux
          - name: macOS arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            os_type: macos
          - name: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            os_type: windows

    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal --target ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "pyratatui-${{ matrix.target }}"
          cache-on-failure: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build wheel (Linux)
        if: matrix.os_type == 'linux'
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          command: build
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --strip --out dist

      - name: Build wheel (macOS / Windows)
        if: matrix.os_type != 'linux'
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          command: build
          target: ${{ matrix.target }}
          args: --release --strip --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 1

  release:
    name: GitHub Release & PyPI Publish
    needs: build
    runs-on: ubuntu-latest
    environment: pypi

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          command: sdist
          args: --out dist

      - name: Generate & verify SHA256SUMS
        run: |
          mkdir -p sha
          cd dist
          sha256sum *.whl *.tar.gz > ../sha/SHA256SUMS
          while read SUM FILE; do
            echo "Verifying $FILE"
            echo "$SUM  $FILE" | sha256sum -c --status || { echo "SHA256 mismatch for $FILE"; exit 1; }
          done < ../sha/SHA256SUMS

      - name: Extract version
        id: version
        run: |
          VERSION=$(sed -n 's/^version *= *"\(.*\)"/\1/p' pyproject.toml | head -1)
          [ -z "$VERSION" ] && { echo "❌ version not found" >&2; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine previous tag
        id: prev
        run: |
          git fetch --tags
          CURRENT="v${{ steps.version.outputs.version }}"
          PREV=$(git tag --sort=-v:refname \
                 | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' \
                 | grep -v "^${CURRENT}$" \
                 | head -1 || true)
          echo "previous=$PREV" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV="${{ steps.prev.outputs.previous }}"
          {
            echo "## pyratatui v${VERSION}"
            echo ""
            if [ -z "$PREV" ]; then
              echo "_🎉 Initial release_"
            else
              echo "### 📜 Full changelog"
              echo "https://github.com/${{ github.repository }}/compare/${PREV}...v${VERSION}"
            fi
          } > release_body.md


      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          body_path: release_body.md
          make_latest: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            sha/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
