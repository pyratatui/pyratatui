name: Extract ZIP at Root and Commit

on:
  workflow_dispatch:

jobs:
  deploy-root-zip:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo without persisting default token
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: false  # IMPORTANT: disables default GITHUB_TOKEN

      # 2️⃣ Install unzip
      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      # 3️⃣ Extract docs_build.zip at repo root
      - name: Extract docs_build.zip
        run: unzip -o docs_build.zip -d .

      # 4️⃣ Commit and push changes using GH_PAGES_TOKEN
      - name: Commit and push changes
        env:
          GH_PAGES_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git rm -f docs_build.zip

          # Commit only if there are changes
          git diff-index --quiet HEAD || git commit -m "Extract docs_build.zip at root"

          # Push using personal token
          git push https://x-access-token:${GH_PAGES_TOKEN}@github.com/${GITHUB_REPOSITORY}.git main
