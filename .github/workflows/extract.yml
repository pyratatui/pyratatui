name: Extract ZIP at Root and Commit

on:
  workflow_dispatch:  # manual trigger

jobs:
  deploy-root-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up unzip
        run: sudo apt-get install -y unzip

      - name: Extract docs_build.zip at repo root
        run: unzip -o docs_build.zip -d .

      - name: Commit and push changes using GH_PAGES_TOKEN
        env:
          GH_PAGES_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git rm docs_build.zip
          git commit -m "Extract docs_build.zip at root" || echo "No changes to commit"
          git push https://x-access-token:${GH_PAGES_TOKEN}@github.com/${GITHUB_REPOSITORY}.git main
